<!doctype html>
<html lang="en">
  <head>

    <title>Faculty Information</title>
    <link rel="stylesheet" href="style.css" />

  <body>

        <label for="name">Name:</label>

        <label for="designation">Faculty Designation:</label>
        <input type="text" id="designation" name="designation" required />

</html>
